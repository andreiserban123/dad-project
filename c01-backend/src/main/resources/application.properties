spring.application.name=c01-backend
server.port=8080

# RabbitMQ — values come from docker-compose environment
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:admin}
spring.rabbitmq.password=${RABBITMQ_PASS:admin}

# Allow large BMP uploads (up to 50 MB)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Static frontend files
spring.web.resources.static-locations=file:/app/static/,classpath:/static/
